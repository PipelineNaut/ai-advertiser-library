  <!-- Connection lines -->
  <line x1="40" y1="33" x2="28" y2="42" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="40" y1="33" x2="52" y2="42" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="51" x2="32" y2="58" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="56" y1="51" x2="48" y2="58" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <line x1="28" y1="46" x2="52" y2="46" stroke="#3b82f6" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
