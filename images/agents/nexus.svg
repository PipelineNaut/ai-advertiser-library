  <circle cx="40" cy="28" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="40" cy="28" r="2" fill="#60a5fa"/>
  <circle cx="24" cy="46" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
