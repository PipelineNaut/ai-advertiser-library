  </defs>
  <rect width="80" height="80" rx="16" fill="#0d0d0d"/>
  <rect width="80" height="80" rx="16" fill="url(#nx-glow)"/>
  <rect x="2" y="2" width="76" height="76" rx="14" fill="none" stroke="url(#nx-bg)" stroke-width="2" opacity="0.6"/>
