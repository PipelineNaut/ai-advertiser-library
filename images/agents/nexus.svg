  <circle cx="56" cy="46" r="5" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="56" cy="46" r="2" fill="#60a5fa"/>
  <circle cx="32" cy="62" r="4" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="32" cy="62" r="1.5" fill="#60a5fa" opacity="0.6"/>
  <circle cx="48" cy="62" r="4" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
