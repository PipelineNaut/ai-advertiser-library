<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <defs>
    <linearGradient id="st-bg" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="st-glow" x1="40" y1="0" x2="40" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="st-bolt" x1="38" y1="14" x2="42" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="16" fill="#0d0d0d"/>
  <rect width="80" height="80" rx="16" fill="url(#st-glow)"/>
  <rect x="2" y="2" width="76" height="76" rx="14" fill="none" stroke="url(#st-bg)" stroke-width="2" opacity="0.6"/>
  <!-- Crosshair circle -->
  <circle cx="40" cy="40" r="22" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
  <circle cx="40" cy="40" r="14" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
  <!-- Crosshair lines -->
  <line x1="40" y1="14" x2="40" y2="24" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="40" y1="56" x2="40" y2="66" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="14" y1="40" x2="24" y2="40" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="56" y1="40" x2="66" y2="40" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Lightning bolt (center) -->
  <path d="M44 22 L36 40 L42 40 L36 58 L48 36 L42 36 Z" fill="url(#st-bolt)" opacity="0.9"/>
  <!-- Spark particles -->
  <circle cx="28" cy="28" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="54" cy="30" r="1" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="52" cy="54" r="1.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="26" cy="52" r="1" fill="#c4b5fd" opacity="0.3"/>
</svg>
